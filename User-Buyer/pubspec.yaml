name: zrent_buyer
description: ZRent Buyer App - Find and rent properties
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  
  # Navigation
  go_router: ^13.2.5
  
  # Backend
  supabase_flutter: ^2.3.4
  
  # Network
  dio: ^5.4.0
  
  # Maps & Location
  geolocator: ^10.1.1
  geocoding: ^2.1.0

  # Payments
  flutter_stripe: ^9.6.0
  flutterwave_standard: ^1.0.0
  
  # Notifications
  # firebase_messaging: ^14.7.0
  # firebase_core: ^2.24.0
  # flutter_local_notifications: ^16.3.0
  
  # Media
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1
  
  # UI
  flutter_svg: ^2.0.9
  shimmer: ^3.0.0
  google_fonts: ^6.1.0
  
  # Utils
  intl: ^0.18.1
  url_launcher: ^6.2.3
  share_plus: ^7.2.2
  permission_handler: ^11.4.0
  
  # JSON Serialization
  json_annotation: ^4.9.0
  
  # Code Generation
  freezed_annotation: ^2.4.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2
  build_runner: ^2.4.13
  riverpod_generator: ^2.3.10
  json_serializable: ^6.8.0
  freezed: ^2.4.7
  custom_lint: ^0.5.11
  riverpod_lint: ^2.3.8

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/get_started_background.png
    - assets/icons/
    - assets/header_house.png
    - assets/images/splash_logo.png
    - assets/images/sign_up_logo.png
    - assets/images/get_started_logo.png
