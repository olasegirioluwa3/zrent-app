name: zrent_agent
description: ZRent Agent Publisher App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  
  # Navigation
  go_router: ^13.0.0
  
  # Authentication
  supabase_flutter: ^2.3.4
  
  # Location Services
  geolocator: ^10.1.0
  permission_handler: ^11.2.0
  
  # Image Handling
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1
  
  # UI Components
  cupertino_icons: ^1.0.6
  google_fonts: ^6.2.1
  iconify_flutter: ^0.0.7
  lucide_icons_flutter: ^3.1.14+2
  
  # Utilities
  shared_preferences: ^2.2.2
  url_launcher: ^6.2.3
  share_plus: ^7.2.1
  
  # Payment
  flutter_stripe: ^9.4.0
  
  # HTTP
  dio: ^5.4.0
  
  # JSON Serialization
  json_annotation: ^4.8.1
  
  # Camera for document scan
  camera: ^0.10.5+5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9
  json_serializable: ^6.7.1
  custom_lint: ^0.5.7
  riverpod_lint: ^2.3.7

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
